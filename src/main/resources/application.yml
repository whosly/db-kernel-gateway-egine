server:
  port: 0  # 使用随机端口

spring:
  application:
    name: db-kernel-gateway-egine

logging:
  level:
    com.whosly.gateway: DEBUG
    com.whosly.gateway.adapter: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

gateway:
  # 数据库类型配置， 类型包括  mysql、postgresql
  proxy-db-type: ${GATEWAY_PROXY_DB_TYPE:postgresql}
  # 代理端口
  proxy-port: ${GATEWAY_PROXY_PORT:5433}

  # 目标数据库配置
  target:
    # 真实目标库凭据由环境变量或本地测试配置注入，避免写入可提交配置。
    host: ${GATEWAY_TARGET_HOST:localhost}
    port: ${GATEWAY_TARGET_PORT:5432}
    username: ${GATEWAY_TARGET_USERNAME:postgres}
    password: ${GATEWAY_TARGET_PASSWORD:}
    database: ${GATEWAY_TARGET_DATABASE:postgres}

  connection:
    pool:
      initial-size: 5
      max-size: 20
      min-idle: 2
  security:
    authentication:
      enabled: true
